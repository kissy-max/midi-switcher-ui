<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDI Switcher Web Editor Final</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface: #1e1e1e;
            --primary: #ffcc00; 
            --primary-dim: #665200;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --danger: #ff4757;
            --border: #333333;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #222; color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* === デバイスプレビュー用コントロールバー === */
        .debug-bar { width: 100%; background: #000; padding: 10px; text-align: center; border-bottom: 2px solid var(--primary); flex-shrink: 0; z-index: 1000; display: flex; justify-content: center; gap: 15px;}
        .btn-debug { background: #333; color: #fff; border: 1px solid #555; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px;}
        .btn-debug.active { background: var(--primary); color: #000; }

        /* === アプリケーションフレーム === */
        #appFrame {
            background-color: var(--bg-color);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* モバイルモード (幅をスマホ実機寄りにしつつ枠を維持) */
        .frame-mobile { width: 100%; max-width: 430px; height: 844px; border: 12px solid #111; border-radius: 35px; margin-top: 20px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .frame-mobile .main-grid { padding: 15px; }
        /* タブレットモード */
        .frame-tablet { width: 100%; max-width: 950px; height: 1080px; border: 16px solid #111; border-radius: 25px; margin-top: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .frame-tablet .main-grid { height: calc(100% - 60px); padding: 15px; }
        /* PCモード (横幅を100%最大限に活かす) */
        .frame-pc { width: 100%; max-width: 100%; height: 100%; border: none; border-radius: 0; margin-top: 0; padding: 20px; overflow: hidden; }
        .frame-pc .main-grid { height: calc(100% - 70px); }

        /* === 共通ハイブリッド・グリッドレイアウト === */
        .main-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 1600px; /* 横方向への最大限の拡大を許可 */
            margin: 0 auto;
        }
        
        /* ★ スマホ時の並び順制御 (Nav -> Edit -> Accordion) */
        .nav-area { order: 1; }
        .edit-area-wrapper { order: 2; display: flex; flex-direction: column; gap: 15px; }
        .accordion-area { order: 3; display: flex; flex-direction: column; gap: 15px; }

        /* タブレット＆PC用 左右カラム制御 */
        @media (min-width: 768px) {
            .main-grid {
                display: grid;
                grid-template-columns: minmax(300px, 3fr) minmax(400px, 5fr); /* 右のエディターを少し広めに */
                grid-template-rows: auto minmax(0, 1fr);
            }
            .nav-area { grid-column: 1; grid-row: 1; margin-bottom: 0 !important; }
            .accordion-area { 
                grid-column: 1; grid-row: 2; 
                overflow-y: auto; 
                padding-right: 5px; 
            }
            .edit-area-wrapper { 
                grid-column: 2; grid-row: 1 / 3; 
                height: 100%; 
            }
            .edit-area {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                margin-bottom: 0;
            }
            #editorContent { overflow-y: auto; flex-grow: 1; padding-right: 10px; }
        }
        
        /* スクロールバー装飾 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* === アプリ内UI要素 === */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; flex-shrink: 0;}
        .header h1 { font-size: 1.3rem; margin: 0; color: var(--primary); letter-spacing: 1px; }
        .btn-connect { background-color: var(--primary-dim); color: var(--text-main); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-connect.connected { background-color: var(--primary); color: #000; }

        .section { background-color: var(--surface); border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-top: 3px solid #2a2a2a; }
        .frame-tablet .section, .frame-pc .section { margin-bottom: 0; }

        /* 折りたたみ（アコーディオン）ヘッダー */
        .accordion-header { background: #000; padding: 12px 15px; border-radius: 8px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; margin-bottom: 10px;}
        .accordion-header:hover { background: #111; border-color: var(--primary-dim); }
        .accordion-content { display: none; padding: 5px; }
        .accordion-content.open { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Nav Area */
        .bank-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 8px;}
        .title-edit { display: flex; gap: 10px; margin-top: 15px;}
        .title-edit input { flex-grow: 1; background: #000; border: 1px dashed var(--primary-dim); color: var(--primary); padding: 12px; border-radius: 5px; font-size: 1.1rem; text-align: center; letter-spacing: 2px; font-weight: bold; width: 100%;}
        
        .btn-small { background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .btn-preset { background: #2a2a2a; border: 2px solid #444; color: #fff; padding: 15px 0; border-radius: 8px; font-size: 1.4rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-preset.active { border-color: var(--primary); background: rgba(255, 204, 0, 0.15); color: var(--primary); }

        /* Edit Area */
        .tabs { display: flex; margin-bottom: 15px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0;}
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: var(--text-sub); transition: 0.2s; }
        .tab.active { background: var(--primary); color: #000; }

        #rearControls { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--primary-dim); flex-shrink: 0;}
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .type-btn { background: #000; color: var(--text-sub); border: 1px solid var(--border); padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; margin-left: 5px; transition: 0.2s;}
        .type-btn.active { background: var(--primary-dim); color: var(--text-main); border-color: var(--primary); }

        .param-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .param-label { width: 65px; font-size: 0.95rem; font-weight: bold; color: var(--text-sub); }
        .param-slider { flex-grow: 1; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }
        .param-val { width: 65px; background: #000; border: 1px solid var(--border); color: #fff; padding: 8px 5px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 1.1rem;}
        
        .cc-block { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        
        /* ★ Saveボタン (エディター枠の一番下) */
        .btn-save { width: 100%; background: var(--primary-dim); border: 1px solid var(--primary); color: #fff; padding: 18px; font-size: 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; flex-shrink: 0; box-shadow: 0 -4px 10px rgba(0,0,0,0.5);}
        .btn-save:active { background: var(--primary); color: #000; transform: scale(0.98); }

        .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-util { background: #000; border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 5px; font-size: 0.9rem; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-util:active { background: #333; border-color: var(--primary); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }

        .hidden { display: none !important; }
        .use-checkbox { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<div class="debug-bar">
    <button class="btn-debug" id="btnDebugMobile" onclick="setDevice('mobile')">📱 Mobile</button>
    <button class="btn-debug" id="btnDebugTablet" onclick="setDevice('tablet')">💊 Tablet</button>
    <button class="btn-debug active" id="btnDebugPC" onclick="setDevice('pc')">💻 PC / Mac</button>
</div>

<div id="appFrame" class="frame-pc">
    
    <div class="header" style="max-width: 1600px; margin: 0 auto; width: 100%;">
        <h1>MIDI Switcher UI</h1>
        <button class="btn-connect" id="btnConnect" onclick="toggleConnect()">Connect BLE</button>
    </div>

    <div class="main-grid">
        
        <div class="nav-area section" style="margin-bottom:0;">
            <div class="bank-controls">
                <button class="btn-small" onclick="changeBank(-1)">◀ Bank</button>
                <span id="displayBank" style="font-size: 1.4rem; font-weight: bold; color: var(--primary);">Bank 1</span>
                <button class="btn-small" onclick="changeBank(1)">Bank ▶</button>
            </div>
            <div class="nav-grid" id="presetGrid"></div>
            <div class="title-edit">
                <input type="text" id="presetTitle" maxlength="16" placeholder="FRONT TITLE (16 CHARS)" onchange="updateTitle()">
            </div>
            <div style="font-size: 0.8rem; color: var(--text-sub); text-align: center; margin-top: 5px;">※Max 16 Characters</div>
        </div>

        <div class="edit-area-wrapper">
            <div class="edit-area section">
                <div class="tabs">
                    <div class="tab active" id="tabFront" onclick="switchTab('front')">Front</div>
                    <div class="tab" id="tabRear" onclick="switchTab('rear')">Rear</div>
                </div>

                <div id="rearControls" class="hidden">
                    <div class="toggle-row">
                        <span style="font-weight: bold; color: #fff;">Use Rear Setting</span>
                        <input type="checkbox" class="use-checkbox" id="useRearToggle" onchange="toggleUseRear()">
                    </div>
                    <div class="toggle-row" style="margin-bottom: 0;">
                        <span style="font-weight: bold; color: var(--text-sub); font-size: 0.95rem;">Switch Type</span>
                        <div style="display: flex; flex: 1; margin-left: 15px;">
                            <button class="type-btn" id="btnTog" onclick="setRearType('Tog')">Toggle</button>
                            <button class="type-btn" id="btnMom" onclick="setRearType('Mom')">Momentary</button>
                        </div>
                    </div>
                    <div class="toggle-row" style="margin-top: 15px; border-top: 1px dashed #444; padding-top: 15px;">
                        <span style="font-weight: bold; color: var(--primary);">Custom Rear Title</span>
                        <input type="checkbox" class="use-checkbox" id="useRearTitleToggle" onchange="toggleRearTitle()">
                    </div>
                    <div class="title-edit" id="rearTitleContainer" style="display:none; margin-top: 5px;">
                        <input type="text" id="rearTitleInput" maxlength="16" placeholder="REAR TITLE (16 CHARS)" onchange="updateRearTitle()">
                    </div>
                </div>

                <div id="editorContent">
                    <div class="param-row">
                        <span class="param-label">PC Num</span>
                        <input type="range" class="param-slider" id="pcSlider" min="0" max="127" oninput="updateActionParam('pc', this.value, true)">
                        <input type="number" class="param-val" id="pcVal" min="0" max="127" oninput="updateActionParam('pc', this.value, false)">
                    </div>
                    <div class="param-row">
                        <span class="param-label">U-PC</span>
                        <input type="range" class="param-slider" id="upcSlider" min="0" max="127" oninput="updateActionParam('upc', this.value, true)">
                        <input type="number" class="param-val" id="upcVal" min="0" max="127" oninput="updateActionParam('upc', this.value, false)">
                    </div>
                    
                    <hr style="border-color: var(--border); margin: 20px 0;">
                    <div style="font-size: 1.1rem; font-weight: bold; color: var(--primary); margin-bottom: 10px;">CC Config (1-8)</div>

                    <div id="ccContainer"></div>
                </div>
            </div>
            <button class="btn-save" onclick="alert('デバイスのEEPROMに保存しました！\n（現在選択中のBank '+currentBank+'-'+currentPreset+'）')">💾 Save Preset to Device</button>
        </div>

        <div class="accordion-area">
            <div class="section" style="padding: 10px;">
                <div class="accordion-header" onclick="toggleAccordion('accPresetUtil')">
                    Preset Utilities <span id="accPresetUtil-arrow">▼</span>
                </div>
                <div class="accordion-content" id="accPresetUtil">
                    <div class="util-grid">
                        <button class="btn-util" onclick="alert('Preset Swap')">🔄 Swap</button>
                        <button class="btn-util" onclick="alert('Preset Copy')">📄 Copy</button>
                        <button class="btn-util btn-danger" style="grid-column: span 2;" onclick="alert('Clear Preset')">🗑️ Clear Preset</button>
                    </div>
                </div>
            </div>

            <div class="section" style="padding: 10px;">
                <div class="accordion-header" onclick="toggleAccordion('accGlobal')">
                    Global Settings <span id="accGlobal-arrow">▼</span>
                </div>
                <div class="accordion-content" id="accGlobal">
                    <div class="param-row">
                        <span class="param-label" style="width: 80px;">MIDI CH</span>
                        <input type="number" class="param-val" min="1" max="16" value="1" style="width: 100%;">
                    </div>
                    <div class="param-row">
                        <span class="param-label" style="width: 80px;">Max Bank</span>
                        <input type="number" class="param-val" min="1" max="9" value="9" style="width: 100%;">
                    </div>
                    <div class="toggle-row" style="margin-top: 15px;">
                        <span style="font-weight: bold; color: var(--text-sub);">USB MIDI</span>
                        <div style="display: flex; flex: 1; margin-left: 15px;">
                            <button class="type-btn active">ON</button>
                            <button class="type-btn">OFF</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="section" style="padding: 10px;">
                <div class="accordion-header" onclick="toggleAccordion('accBrowser')">
                    Browser Utilities <span id="accBrowser-arrow">▼</span>
                </div>
                <div class="accordion-content" id="accBrowser">
                    <div class="util-grid">
                        <button class="btn-util">📂 Backup All</button>
                        <button class="btn-util">📥 Restore All</button>
                        <button class="btn-util btn-danger" style="grid-column: span 2;">⚠️ Factory Reset</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // ==========================================
    // UI デバッグ・表示切り替えロジック
    // ==========================================
    function setDevice(mode) {
        document.querySelectorAll('.btn-debug').forEach(b => b.classList.remove('active'));
        const frame = document.getElementById('appFrame');
        
        if (mode === 'mobile') {
            document.getElementById('btnDebugMobile').classList.add('active');
            frame.className = 'frame-mobile';
        } else if (mode === 'tablet') {
            document.getElementById('btnDebugTablet').classList.add('active');
            frame.className = 'frame-tablet';
        } else {
            document.getElementById('btnDebugPC').classList.add('active');
            frame.className = 'frame-pc';
        }
    }

    function toggleAccordion(id) {
        const content = document.getElementById(id);
        const arrow = document.getElementById(id + '-arrow');
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            arrow.innerText = '▼';
        } else {
            content.classList.add('open');
            arrow.innerText = '▲';
        }
    }

    // ==========================================
    // JS データ＆ロジック
    // ==========================================
    let currentBank = 1; let currentPreset = 1; let currentTab = 'front';
    let appData = {};

    function initData() {
        for (let b = 1; b <= 9; b++) {
            appData[b] = {};
            for (let p = 1; p <= 8; p++) {
                appData[b][p] = {
                    name: `PRESET ${b}-${p}`, useRear: false, rearType: 'Tog', useRearName: false, rearName: `REAR ${b}-${p}`,
                    front: { pc: 0, upc: 255, cc: Array.from({length:8}, () => ({use:false, num:0, val:0})) },
                    rear: { pc: 0, upc: 255, cc: Array.from({length:8}, () => ({use:false, num:0, val:0})) }
                };
            }
        }
    }

    function buildUI() {
        const presetGrid = document.getElementById('presetGrid');
        presetGrid.innerHTML = '';
        for (let i = 1; i <= 8; i++) {
            const btn = document.createElement('button');
            btn.className = `btn-preset ${i === currentPreset ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => selectPreset(i);
            presetGrid.appendChild(btn);
        }

        const ccContainer = document.getElementById('ccContainer');
        ccContainer.innerHTML = '';
        for (let i = 0; i < 8; i++) {
            ccContainer.innerHTML += `
                <div class="cc-block">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <span style="font-weight: bold; color: var(--primary); font-size: 1.1rem;">CC ${i+1}</span>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: bold;">
                            Use <input type="checkbox" class="use-checkbox" id="ccUse${i}" onchange="updateCCParam(${i}, 'use', this.checked)">
                        </label>
                    </div>
                    <div class="param-row" style="margin-bottom: 8px;">
                        <span class="param-label" style="width: 40px;">Num</span>
                        <input type="range" class="param-slider" id="ccNumSlider${i}" min="0" max="127" oninput="updateCCParam(${i}, 'num', this.value, true)">
                        <input type="number" class="param-val" id="ccNumVal${i}" min="0" max="127" oninput="updateCCParam(${i}, 'num', this.value, false)">
                    </div>
                    <div class="param-row" style="margin-bottom: 0;">
                        <span class="param-label" style="width: 40px;">Val</span>
                        <input type="range" class="param-slider" id="ccValSlider${i}" min="0" max="127" oninput="updateCCParam(${i}, 'val', this.value, true)">
                        <input type="number" class="param-val" id="ccValVal${i}" min="0" max="127" oninput="updateCCParam(${i}, 'val', this.value, false)">
                    </div>
                </div>
            `;
        }
    }

    function refreshEditorUI() {
        const pData = appData[currentBank][currentPreset];
        const actionData = pData[currentTab];

        document.getElementById('presetTitle').value = pData.name;
        document.getElementById('useRearToggle').checked = pData.useRear;
        document.getElementById('btnTog').className = `type-btn ${pData.rearType === 'Tog' ? 'active' : ''}`;
        document.getElementById('btnMom').className = `type-btn ${pData.rearType === 'Mom' ? 'active' : ''}`;
        
        document.getElementById('useRearTitleToggle').checked = pData.useRearName;
        document.getElementById('rearTitleInput').value = pData.rearName;
        document.getElementById('rearTitleContainer').style.display = pData.useRearName ? 'flex' : 'none';

        document.getElementById('pcSlider').value = actionData.pc === 255 ? 0 : actionData.pc;
        document.getElementById('pcVal').value = actionData.pc === 255 ? 0 : actionData.pc;
        document.getElementById('upcSlider').value = actionData.upc === 255 ? 0 : actionData.upc;
        document.getElementById('upcVal').value = actionData.upc === 255 ? 0 : actionData.upc;

        for (let i = 0; i < 8; i++) {
            document.getElementById(`ccUse${i}`).checked = actionData.cc[i].use;
            document.getElementById(`ccNumSlider${i}`).value = actionData.cc[i].num;
            document.getElementById(`ccNumVal${i}`).value = actionData.cc[i].num;
            document.getElementById(`ccValSlider${i}`).value = actionData.cc[i].val;
            document.getElementById(`ccValVal${i}`).value = actionData.cc[i].val;
        }
    }

    function updateActionParam(param, val, fromSlider) {
        val = parseInt(val) || 0; if(val > 127) val = 127; if(val < 0) val = 0;
        appData[currentBank][currentPreset][currentTab][param] = val;
        if(fromSlider) document.getElementById(`${param}Val`).value = val;
        else document.getElementById(`${param}Slider`).value = val;
    }

    function updateCCParam(index, param, val, fromSlider) {
        if(param !== 'use') { val = parseInt(val) || 0; if(val > 127) val = 127; if(val < 0) val = 0; }
        appData[currentBank][currentPreset][currentTab].cc[index][param] = val;
        if (param !== 'use') {
            let capParam = param.charAt(0).toUpperCase() + param.slice(1);
            if(fromSlider) document.getElementById(`cc${capParam}Val${index}`).value = val;
            else document.getElementById(`cc${capParam}Slider${index}`).value = val;
        }
    }

    function updateTitle() { appData[currentBank][currentPreset].name = document.getElementById('presetTitle').value.toUpperCase(); }
    function updateRearTitle() { appData[currentBank][currentPreset].rearName = document.getElementById('rearTitleInput').value.toUpperCase(); }

    function toggleRearTitle() {
        appData[currentBank][currentPreset].useRearName = document.getElementById('useRearTitleToggle').checked;
        document.getElementById('rearTitleContainer').style.display = appData[currentBank][currentPreset].useRearName ? 'flex' : 'none';
    }

    function toggleUseRear() {
        const pData = appData[currentBank][currentPreset];
        const isChecked = document.getElementById('useRearToggle').checked;
        if (isChecked && !pData.useRear && confirm("Frontの設定をRearにコピーしますか？")) pData.rear = JSON.parse(JSON.stringify(pData.front));
        pData.useRear = isChecked;
        refreshEditorUI();
    }

    function setRearType(type) {
        appData[currentBank][currentPreset].rearType = type;
        document.getElementById('btnTog').className = `type-btn ${type === 'Tog' ? 'active' : ''}`;
        document.getElementById('btnMom').className = `type-btn ${type === 'Mom' ? 'active' : ''}`;
    }

    function switchTab(tabName) {
        currentTab = tabName;
        document.getElementById('tabFront').className = `tab ${tabName === 'front' ? 'active' : ''}`;
        document.getElementById('tabRear').className = `tab ${tabName === 'rear' ? 'active' : ''}`;
        document.getElementById('rearControls').classList.toggle('hidden', tabName !== 'rear');
        refreshEditorUI();
    }

    function selectPreset(num) {
        currentPreset = num;
        document.querySelectorAll('.btn-preset').forEach((b, idx) => b.className = `btn-preset ${idx + 1 === num ? 'active' : ''}`);
        refreshEditorUI();
    }

    function changeBank(dir) {
        currentBank += dir;
        if(currentBank > 9) currentBank = 1;
        if(currentBank < 1) currentBank = 9;
        document.getElementById('displayBank').innerText = `Bank ${currentBank}`;
        refreshEditorUI();
    }

    let isConnected = false;
    function toggleConnect() {
        const btn = document.getElementById('btnConnect');
        if (!isConnected) {
            btn.className = 'btn-connect connected'; btn.innerText = '🟢 Connected'; isConnected = true;
        } else {
            btn.className = 'btn-connect'; btn.innerText = 'Connect BLE'; isConnected = false;
        }
    }

    initData();
    buildUI();
    refreshEditorUI();
</script>

</body>
</html>
