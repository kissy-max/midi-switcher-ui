<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIDI Switcher Ultimate</title>
  
  <script>
    const themes = [
      { main: '#ffcc00', dim: '#b28e00', bg: 'rgba(255, 204, 0, 0.15)' },
      { main: '#ff3838', dim: '#b22727', bg: 'rgba(255, 56, 56, 0.15)' },
      { main: '#2e66ff', dim: '#2047b2', bg: 'rgba(46, 102, 255, 0.15)' },
      { main: '#7affff', dim: '#55b2b2', bg: 'rgba(122, 255, 255, 0.15)' },
      { main: '#4dff4d', dim: '#35b235', bg: 'rgba(77, 255, 77, 0.15)' },
      { main: '#e375ff', dim: '#9e51b2', bg: 'rgba(227, 117, 255, 0.15)' },
      { main: '#ff8ff0', dim: '#b264a8', bg: 'rgba(255, 143, 240, 0.15)' },
      { main: '#a1a1a1', dim: '#707070', bg: 'rgba(161, 161, 161, 0.15)' }
    ];
    let currentThemeIdx = localStorage.getItem('savedThemeIdx') ? parseInt(localStorage.getItem('savedThemeIdx')) : 0;
    const t = themes[currentThemeIdx];
    document.documentElement.style.setProperty('--main-color', t.main);
    document.documentElement.style.setProperty('--main-color-dim', t.dim);
    document.documentElement.style.setProperty('--active-bg', t.bg);
    const isSmartphone = /iPhone|Android.*Mobile/i.test(navigator.userAgent);
  </script>

  <style>
    :root {
      --bg-base: #111111; --bg-panel: #1e1e1e; --bg-card: #252525; --bg-input: #000000;
      --text-main: #f5f5f5; --text-muted: #aaaaaa; --border-color: #3a3a3a; --danger: #ff4444;
    }
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-base); color: var(--text-main); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; transition: background-color 0.3s; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--border-color); height: 60px; }
    h1 { color: var(--main-color); font-size: 20px; margin: 0; text-transform: uppercase; cursor: pointer; user-select: none; }
    .status-badge { background: var(--bg-panel); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; color: var(--main-color); border: 1px solid var(--main-color-dim); }
    .status-dot { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; }
    .btn-connect { background: var(--main-color); color: #000; border: none; padding: 6px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    
    .app-container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 60px); overflow: hidden; }
    
    /* PC版パネル制御: 左が縮みやすく(3)、右が維持(1) */
    .left-panel { flex: 1 3 350px; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
    .right-panel { flex: 2 1 600px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
    
    .left-scroll-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .bank-ctrl { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); flex-shrink: 0; }
    .btn-bank { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .bank-disp { font-size: 20px; font-weight: bold; color: var(--main-color); }
    
    .card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
    .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .preset-btn { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 8px; padding: 10px 5px; cursor: pointer; text-align: center; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .preset-btn.active { border-color: var(--main-color); background: var(--active-bg); }
    .preset-btn .tile-num { font-size: 24px; font-weight: 900; color: var(--text-main); }
    .preset-subtitle { width: 100%; display: block; font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: uppercase; }
    .preset-btn.active .preset-subtitle { color: var(--main-color); font-weight: bold; }

    .accordion { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
    .acc-header { padding: 12px 15px; font-weight: bold; color: var(--main-color); cursor: pointer; display: flex; justify-content: space-between; background: var(--bg-panel); }
    .acc-header::after { content: '▼'; font-size: 12px; }
    .accordion.open .acc-body { display: block; }
    .acc-body { display: none; padding: 15px; border-top: 1px solid var(--border-color); }
    
    .btn-util { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
    .btn-danger { background: rgba(255,0,0,0.1); border: 1px solid var(--danger); color: var(--danger); width: 100%; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .num-input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--main-color); padding: 5px; width: 60px; text-align: center; border-radius: 4px; font-weight: bold; font-family: monospace; cursor: pointer; }

    .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 15px; }
    .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-muted); background: var(--bg-card); border-radius: 6px 6px 0 0; }
    .tab.active { background: var(--main-color); color: #000; font-weight: bold; }
    .editor-content { flex-grow: 1; overflow-y: auto; }
    .rack-row { display: flex; gap: 15px; align-items: center; background: var(--bg-card); padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 10px; }
    .rack-label { width: 50px; font-weight: bold; color: var(--main-color); font-size: 14px; }
    .rack-toggle { -webkit-appearance: none; width: 40px; height: 20px; background: #111; border: 1px solid #555; border-radius: 10px; position: relative; cursor: pointer; outline: none; }
    .rack-toggle:checked { background: var(--active-bg); border-color: var(--main-color); }
    .rack-toggle:checked::after { background: var(--main-color); transform: translateX(20px); }
    .rack-toggle::after { content: ''; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; background: #888; border-radius: 50%; transition: 0.2s; }
    .btn-save-main { background: var(--main-color-dim); color: #fff; border: 1px solid var(--main-color); width: 100%; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }

    .cc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .cc-tile { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
    .cc-tile.active { border-color: var(--main-color); background: var(--active-bg); }
    .cc-tile-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--main-color); margin-bottom: 8px; font-weight: bold;}
    .cc-tile-body { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
    .cc-half-btn { flex: 1; background: rgba(0,0,0,0.3); border-radius: 4px; display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
    .cc-tile-label { font-size: 11px; color: var(--text-muted); font-weight: bold; }
    .cc-tile-val { font-size: 18px; font-family: monospace; color: var(--text-main); font-weight: bold; }
    .cc-tile:not(.active) .cc-half-btn { opacity: 0.3; cursor: not-allowed; }

    /* =========================================
       Smartphone View
       ========================================= */
    body.mobile-view header { height: 100px; padding: 15px 10px; flex-direction: column; justify-content: center; gap: 12px; }
    body.mobile-view .app-container { height: calc(100vh - 100px); flex-direction: column; padding: 0; }
    body.mobile-view .mobile-current-preset { display: flex; flex-direction: column; align-items: center; background: var(--bg-panel); padding: 10px; }
    body.mobile-view .mcp-name { font-size: 32px; font-weight: bold; color: var(--main-color); font-family: monospace; }
    
    /* ★ ポップアップの幅とスクロール固定 */
    body.mobile-view .right-panel { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      width: 92%; max-height: 90vh; z-index: 100; display: none; 
      border: 1px solid var(--main-color); box-shadow: 0 10px 40px rgba(0,0,0,0.9);
      overflow-x: hidden;
    }
    body.mobile-view .right-panel.open { display: flex; }
    body.mobile-view .sheet-header-mobile { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

    /* ★ 入力欄を左に寄せる (余計な space-between を上書き) */
    body.mobile-view .rack-row { justify-content: flex-start; }

    /* ★ CCタイルの巨大化（縦に伸ばす） */
    body.mobile-view .cc-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 0 5px; }
    body.mobile-view .cc-tile { aspect-ratio: auto; height: 130px; padding: 6px; }
    body.mobile-view .cc-half-btn { flex-direction: column; gap: 4px; }
    body.mobile-view .cc-tile-val { font-size: 18px; }

    /* Modal Overlay */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; z-index: 99; }
    .modal-overlay.open { display: block; }
    .btn-close { background: var(--bg-panel); color: #fff; border: 1px solid var(--border-color); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

    /* Numpad */
    .numpad-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; }
    .numpad-overlay.open { display: block; }
    .numpad-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: var(--bg-panel); border: 2px solid var(--main-color); border-radius: 12px; padding: 20px; z-index: 201; display: none; }
    .numpad-container.open { display: block; }
    .numpad-disp { background: #000; color: #fff; font-size: 32px; text-align: right; padding: 10px; margin-bottom: 15px; border-radius: 6px; font-family: monospace; border: 1px solid var(--border-color); }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .numpad-btn { background: var(--bg-card); color: #fff; padding: 15px; text-align: center; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .numpad-btn:active { background: var(--main-color); color: #000; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<script>if (isSmartphone) document.body.classList.add('mobile-view');</script>

<div id="loader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:9999;display:none;flex-direction:column;justify-content:center;align-items:center;color:var(--main-color);font-weight:bold;"><div id="loader-msg">LOADING...</div></div>

<div id="numpad-bg" class="numpad-overlay" onclick="closeNumpad()"></div>
<div id="numpad-modal" class="numpad-container">
  <div id="numpad-title" style="text-align:center; color:var(--main-color); margin-bottom:10px; font-weight:bold; text-transform:uppercase;">Input</div>
  <div id="numpad-disp" class="numpad-disp">0</div>
  <div class="numpad-grid">
    <div class="numpad-btn" onclick="numpadPress(7)">7</div><div class="numpad-btn" onclick="numpadPress(8)">8</div><div class="numpad-btn" onclick="numpadPress(9)">9</div>
    <div class="numpad-btn" onclick="numpadPress(4)">4</div><div class="numpad-btn" onclick="numpadPress(5)">5</div><div class="numpad-btn" onclick="numpadPress(6)">6</div>
    <div class="numpad-btn" onclick="numpadPress(1)">1</div><div class="numpad-btn" onclick="numpadPress(2)">2</div><div class="numpad-btn" onclick="numpadPress(3)">3</div>
    <div class="numpad-btn" style="color:var(--danger)" onclick="numpadClear()">C</div><div class="numpad-btn" onclick="numpadPress(0)">0</div><div class="numpad-btn" style="color:var(--main-color)" onclick="numpadBS()">←</div>
  </div>
  <div style="display:flex; gap:10px; margin-top:15px;">
    <button class="btn-util" style="margin:0" onclick="closeNumpad()">CANCEL</button>
    <button class="btn-save-main" style="margin:0" onclick="numpadOK()">OK</button>
  </div>
</div>

<header>
  <h1 onclick="cycleTheme()">MIDI Switcher</h1>
  <div style="display:flex; gap:15px; align-items:center;">
    <button id="btnConnect" class="btn-connect" onclick="connectBLE()">📡 CONNECT BLE</button>
    <div class="status-badge" id="status-badge"><div class="status-dot"></div> Disconnected</div>
  </div>
</header>

<div class="app-container" id="main-ui">
  <div class="left-panel">
    <div id="mobileCurrentPreset" class="mobile-current-preset">
      <div style="font-size:10px; color:var(--main-color-dim); font-weight:bold;">CURRENT PRESET <span id="mcpNum" style="margin-left:5px;">1-1</span></div>
      <div class="mcp-name" id="mcpName">PRESET NAME</div>
    </div>
    <div class="bank-ctrl">
      <button class="btn-bank" onclick="changeBank(-1)">◀ BANK</button>
      <div class="bank-disp" id="disp-bank">Bank 1</div>
      <button class="btn-bank" onclick="changeBank(1)">BANK ▶</button>
    </div>
    <div class="card"><div class="preset-grid" id="presetGrid"></div></div>
    <div class="left-scroll-area">
      <div class="accordion" id="acc-utils">
        <div class="acc-header" onclick="toggleAccordion('acc-utils')">Preset & Bank Utilities</div>
        <div class="acc-body">
          <div style="display:flex; gap:10px; margin-bottom:10px;"><button class="btn-util" style="margin:0" onclick="swapPreset()">🔄 Swap Pr</button><button class="btn-util" style="margin:0" onclick="copyPreset()">📄 Copy Pr</button></div>
          <button class="btn-danger" style="margin-bottom:15px" onclick="clearCurrentPreset()">🗑️ Clear Preset</button>
          <div style="display:flex; gap:10px;"><button class="btn-util" style="margin:0" onclick="swapBank()">🔄 Swap Bank</button><button class="btn-util" style="margin:0" onclick="copyBank()">📄 Copy Bank</button></div>
        </div>
      </div>
      <div class="accordion" id="acc-global">
        <div class="acc-header" onclick="toggleAccordion('acc-global')">Global Settings</div>
        <div class="acc-body">
          <div class="form-row-global" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><label>MIDI CH</label><input type="text" readonly id="gs-mc" class="num-input" value="1" onclick="editWithNumpad('MIDI CH', {max:16}, 'gs-mc', (v)=>{ if(v<1)v=1; document.getElementById('gs-mc').value=v; saveGlobalSettings(); })"></div>
          <div class="form-row-global" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><label>Max Bank</label><input type="text" readonly id="gs-mb" class="num-input" value="9" onclick="editWithNumpad('Max Bank', {max:9}, 'gs-mb', (v)=>{ if(v<1)v=1; document.getElementById('gs-mb').value=v; saveGlobalSettings(); })"></div>
          <div class="form-row-global" style="display:flex; justify-content:space-between; align-items:center;"><label>USB MIDI</label><input type="checkbox" class="rack-toggle" id="usbMidiToggle" onchange="toggleUsbMidi(); saveGlobalSettings();" checked></div>
        </div>
      </div>
      <div class="accordion" id="acc-sync">
        <div class="acc-header" onclick="toggleAccordion('acc-sync')">Data Sync</div>
        <div class="acc-body">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn-util" style="margin:0" onclick="saveToPC()">💾 PC Save</button><button class="btn-util" style="margin:0" onclick="document.getElementById('fileInput').click()">📂 PC Load</button>
            <button class="btn-util" style="margin:0; background:var(--active-bg); color:var(--main-color);" onclick="sendAllToDevice()">📤 All Upload</button><button class="btn-util" style="margin:0; background:rgba(0,255,136,0.1); color:#00ff88;" onclick="loadFromDevice()">📥 All Sync</button>
          </div>
          <input type="file" id="fileInput" style="display:none" onchange="loadFromPC(event)">
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="right-panel" id="editor-sheet">
    <div class="sheet-header-mobile"><h2 id="sheet-title" style="color:var(--main-color); margin:0;">EDIT</h2><button class="btn-close" onclick="closeSheet()">✕</button></div>
    <div class="rack-row" style="background:var(--bg-input); border-color:var(--main-color); margin-bottom: 15px;">
      <div class="rack-label" style="width:80px;">Name</div>
      <input type="text" id="presetTitle" maxlength="11" onchange="updateTitle()" style="flex:1; background:transparent; border:none; border-bottom:2px solid var(--main-color-dim); color:var(--main-color); font-weight:bold; outline:none; text-transform:uppercase; font-size:28px; font-family:monospace;">
    </div>
    <div class="rack-row common-row" style="margin-bottom:15px; display:flex;">
      <div style="display:flex; align-items:center; gap:10px;"><div class="rack-label" style="width:auto;">PC</div><input type="text" readonly class="num-input" id="pcVal" onclick="editWithNumpad('PC Value', {max:127}, 'pcVal', (v)=>updateActionParam('pc', v))"></div>
      <div id="upcCol" style="display:flex; align-items:center; gap:10px; border-left:1px solid #444; padding-left:15px; margin-left:15px;"><div class="rack-label" style="width:auto;">U-PC</div><input type="text" readonly class="num-input" id="upcVal" onclick="editWithNumpad('U-PC Value', {max:127}, 'upcVal', (v)=>updateActionParam('upc', v))"></div>
    </div>
    <div class="tabs"><div class="tab active" id="tabFront" onclick="switchTab('front')">Front</div><div class="tab" id="tabRear" onclick="switchTab('rear')">Rear</div></div>
    <div class="editor-content" id="editorContent">
      <div id="rearControls" class="hidden">
        <div class="rack-row" style="background:var(--active-bg);"><div class="rack-label" style="width:100px;">Use Rear</div><input type="checkbox" class="rack-toggle" id="useRearToggle" onchange="toggleUseRear()"></div>
        <div id="rearSettingsArea" style="transition:0.3s;">
          <div class="rack-row"><div class="rack-label" style="width:100px;">Type</div><div class="segmented"><div class="seg-btn" id="btnTog" onclick="setRearType('Tog')">Toggle</div><div class="seg-btn" id="btnMom" onclick="setRearType('Mom')">Momentary</div></div></div>
          <div class="rack-row"><div class="rack-label" style="width:100px;">Custom</div><input type="checkbox" class="rack-toggle" id="useRearTitleToggle" onchange="toggleRearTitle()"><input type="text" id="rearTitleInput" maxlength="11" onchange="updateRearTitle()" style="flex:1; background:var(--bg-input); border:1px solid var(--border-color); color:var(--main-color); display:none; padding:5px; text-transform:uppercase;"></div>
        </div>
      </div>
      <h4 id="ccHeader" style="color:var(--text-muted); margin: 0 0 10px 0; border-bottom:1px solid var(--border-color);">CC Config (1-8)</h4>
      <div id="ccContainer" class="cc-grid"></div>
    </div>
    <button class="btn-save-main" style="margin-top:15px" onclick="sendToDevice()">💾 Save to Device</button>
  </div>
</div>

<script>
  let appData = {}, currentBank = 1, currentPreset = 1, maxBank = 9, currentTab = 'front';
  let bleDevice, bleServer, rxChar, txChar, receiveBuffer = "", resolveInfoLoad, resolveBankLoad, timerInfo, timerBank;

  function cycleTheme() { currentThemeIdx = (currentThemeIdx + 1) % themes.length; localStorage.setItem('savedThemeIdx', currentThemeIdx); const t = themes[currentThemeIdx]; const r = document.documentElement; r.style.setProperty('--main-color', t.main); r.style.setProperty('--main-color-dim', t.dim); r.style.setProperty('--active-bg', t.bg); buildUI(); refreshEditorUI(); }

  // Numpad Logic
  let numpadConfig = {}, numpadCallback = null, numpadCurVal = "";
  function openNumpad(title, config, cb) { document.getElementById('numpad-title').innerText = title; numpadConfig = config; numpadCallback = cb; numpadCurVal = ""; updateNumpadDisp(); document.getElementById('numpad-bg').classList.add('open'); document.getElementById('numpad-modal').classList.add('open'); document.addEventListener('keydown', handleNumpadKey); }
  function closeNumpad() { document.getElementById('numpad-bg').classList.remove('open'); document.getElementById('numpad-modal').classList.remove('open'); document.removeEventListener('keydown', handleNumpadKey); }
  function numpadPress(n) { if (numpadConfig.type === 'preset') { if (numpadCurVal.length === 0) { if (n >= 1 && n <= maxBank) numpadCurVal += n.toString(); } else if (numpadCurVal.length === 1) { if (n >= 1 && n <= 8) numpadCurVal += n.toString(); } } else { let next = numpadCurVal + n.toString(); if (parseInt(next) > numpadConfig.max) next = numpadConfig.max.toString(); if (next.length > 1 && next.startsWith("0")) next = parseInt(next).toString(); numpadCurVal = next; } updateNumpadDisp(); }
  function numpadBS() { numpadCurVal = numpadCurVal.slice(0, -1); updateNumpadDisp(); }
  function numpadClear() { numpadCurVal = ""; updateNumpadDisp(); }
  function numpadOK() { if (numpadConfig.type === 'preset' && numpadCurVal.length !== 2) return; let v = numpadConfig.type === 'preset' ? {b:parseInt(numpadCurVal[0]), p:parseInt(numpadCurVal[1])} : (parseInt(numpadCurVal) || 0); closeNumpad(); if (numpadCallback) numpadCallback(v); }
  function updateNumpadDisp() { if (numpadConfig.type === 'preset') { let b = numpadCurVal[0] || '○', p = numpadCurVal[1] || '○'; document.getElementById('numpad-disp').innerText = `${b} - ${p}`; } else { document.getElementById('numpad-disp').innerText = numpadCurVal === "" ? "0" : numpadCurVal; } }
  function handleNumpadKey(e) { if (e.key >= '0' && e.key <= '9') { e.preventDefault(); numpadPress(parseInt(e.key)); } else if (e.key === 'Backspace') { e.preventDefault(); numpadBS(); } else if (e.key === 'Enter') { e.preventDefault(); numpadOK(); } else if (e.key === 'Escape') { e.preventDefault(); closeNumpad(); } }
  function editWithNumpad(title, config, elId, cb) { let el = document.getElementById(elId); if (el && el.disabled) return; openNumpad(title, config, (v) => { if(el && typeof v !== 'object') el.value = v; cb(v); }); }
  function editCCNum(i) { if (!appData[currentBank][currentPreset][currentTab].cc[i].use) return; openNumpad(`CC${i+1} NUM`, {max:127}, (v) => { updateCCParam(i, 'num', v); }); }
  function editCCVal(i) { if (!appData[currentBank][currentPreset][currentTab].cc[i].use) return; openNumpad(`CC${i+1} VAL`, {max:127}, (v) => { updateCCParam(i, 'val', v); }); }

  // BLE Core
  async function connectBLE() {
    try {
      showLoader("CONNECTING...");
      bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ name: 'MIDI Switcher BLE' }], optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      bleServer = await bleDevice.gatt.connect();
      const service = await bleServer.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
      rxChar = await service.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
      txChar = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
      txChar.addEventListener('characteristicvaluechanged', (e) => {
        receiveBuffer += new TextDecoder().decode(e.target.value);
        if (receiveBuffer.includes('\n')) {
          let parts = receiveBuffer.split('\n'); receiveBuffer = parts.pop();
          for (let s of parts) if(s.trim()) try { processBleResponse(JSON.parse(s.trim())); } catch(err) {}
        }
      });
      await txChar.startNotifications();
      document.getElementById('btnConnect').style.display = 'none';
      await fetchInfoBLE(); await fetchBankDataBLE(currentBank);
      buildUI(); refreshEditorUI(); setUILock(false); hideLoader(); setStatus('ok', 'Connected');
    } catch (e) { hideLoader(); setStatus('err', 'BLE Error'); }
  }
  function setUILock(isLocked) { const ui = document.getElementById('main-ui'); if(isLocked) { ui.style.pointerEvents='none'; ui.style.opacity='0.3'; } else { ui.style.pointerEvents='auto'; ui.style.opacity='1'; } }
  function onDisconnected() { setStatus('err', 'Disconnected'); document.getElementById('btnConnect').style.display = 'block'; setUILock(true); }
  async function sendBleCommand(obj) { if (!rxChar) return; const data = new TextEncoder().encode(JSON.stringify(obj) + "\n"); await rxChar.writeValue(data); }
  
  function processBleResponse(data) {
    if (data.cmd === "info_res") { currentBank = data.cB || 1; maxBank = data.gs.mB || 9; document.getElementById('gs-mc').value = data.gs.mC; document.getElementById('gs-mb').value = data.gs.mB; if (resolveInfoLoad) { clearTimeout(timerInfo); resolveInfoLoad(); resolveInfoLoad = null; } }
    else if (data.cmd === "bank_res") { let b = data.b; let arr = data.data; for(let i=0; i<8; i++) { let p = i+1, d = arr[i]; appData[b][p] = { name: d.name, rearName: d.rName, useRear: d.uR, useRearName: d.uRn, rearType: d.isM ? 'Mom' : 'Tog', front: { pc: d.f.pc, upc: d.f.upc, cc: d.f.cU.map((u,idx)=>({use:u, num:d.f.cN[idx], val:d.f.cV[idx]})) }, rear: { pc: d.r.pc, upc: d.r.upc, cc: d.r.cU.map((u,idx)=>({use:u, num:d.r.cN[idx], val:d.r.cV[idx]})) } }; } if (resolveBankLoad) { clearTimeout(timerBank); resolveBankLoad(); resolveBankLoad = null; } }
    else if (data.cmd === "status") { currentBank = data.cB; currentPreset = data.cP; buildUI(); refreshEditorUI(); }
  }
  async function fetchInfoBLE() { return new Promise((r) => { resolveInfoLoad = r; sendBleCommand({ cmd: "info" }); timerInfo = setTimeout(() => { if(resolveInfoLoad){resolveInfoLoad=null; r();} }, 5000); }); }
  async function fetchBankDataBLE(b) { return new Promise((r) => { resolveBankLoad = r; sendBleCommand({ cmd: "bank", b: b }); timerBank = setTimeout(() => { if(resolveBankLoad){resolveBankLoad=null; r();} }, 5000); }); }

  // UI Logic
  function initData() { for (let b=1; b<=99; b++) { appData[b]={}; for (let p=1; p<=8; p++) appData[b][p] = { name:`PRESET ${b}-${p}`, rearName:`REAR ${b}-${p}`, useRear:false, useRearName:false, rearType:'Tog', front:{pc:0, upc:0, cc:Array.from({length:8},()=>({use:false,num:0,val:0}))}, rear:{pc:0, upc:0, cc:Array.from({length:8},()=>({use:false,num:0,val:0}))} }; } }
  function buildUI() {
    const grid = document.getElementById('presetGrid'); grid.innerHTML = '';
    for (let i=1; i<=8; i++) { const btn = document.createElement('div'); btn.className = `preset-btn ${i === currentPreset ? 'active' : ''}`; btn.innerHTML = `<div class="tile-num">${i}</div><div class="preset-subtitle">${appData[currentBank][i].name}</div>`; btn.onclick = () => selectPreset(i); grid.appendChild(btn); }
    const cc = document.getElementById('ccContainer');
    if(!cc.innerHTML) { for (let i=0; i<8; i++) cc.innerHTML += `<div class="cc-tile" id="ccTile${i}"><div class="cc-tile-header"><span>CC ${i+1}</span><input type="checkbox" class="rack-toggle" id="ccUse${i}" onchange="updateCCParam(${i}, 'use', this.checked)"></div><div class="cc-tile-body"><div class="cc-half-btn" onclick="editCCNum(${i})"><div class="cc-tile-label">NUM</div><div class="cc-tile-val" id="ccNumDisp${i}">0</div></div><div class="cc-half-btn" onclick="editCCVal(${i})"><div class="cc-tile-label">VAL</div><div class="cc-tile-val" id="ccValDisp${i}">0</div></div></div></div>`; }
    document.getElementById('disp-bank').innerText = `Bank ${currentBank}`;
  }
  function refreshEditorUI() {
    const p = appData[currentBank][currentPreset], a = p[currentTab];
    document.getElementById('presetTitle').value = p.name;
    document.getElementById('pcVal').value = p.front.pc; document.getElementById('upcVal').value = p.front.upc;
    document.getElementById('useRearToggle').checked = p.useRear;
    document.getElementById('btnTog').className = `seg-btn ${p.rearType === 'Tog' ? 'active' : ''}`;
    document.getElementById('btnMom').className = `seg-btn ${p.rearType === 'Mom' ? 'active' : ''}`;
    document.getElementById('useRearTitleToggle').checked = p.useRearName; document.getElementById('rearTitleInput').value = p.rearName; document.getElementById('rearTitleInput').style.display = p.useRearName ? 'block' : 'none';
    for (let i=0; i<8; i++) { let c = a.cc[i]; document.getElementById(`ccUse${i}`).checked = c.use; document.getElementById(`ccNumDisp${i}`).innerText = c.num; document.getElementById(`ccValDisp${i}`).innerText = c.val; document.getElementById(`ccTile${i}`).classList.toggle('active', c.use); }
    document.getElementById('rearControls').classList.toggle('hidden', currentTab !== 'rear');
    if (isSmartphone) { document.getElementById('mcpName').innerText = p.name; document.getElementById('mcpNum').innerText = `${currentBank}-${currentPreset}`; }
    const area = document.getElementById('rearSettingsArea'), ccCont = document.getElementById('ccContainer'), ccHead = document.getElementById('ccHeader');
    area.style.opacity = p.useRear ? "1" : "0.4"; area.style.pointerEvents = p.useRear ? "auto" : "none";
    if (currentTab === 'rear' && !p.useRear) { ccCont.style.opacity="0.4"; ccCont.style.pointerEvents="none"; ccHead.style.opacity="0.4"; }
    else { ccCont.style.opacity="1"; ccCont.style.pointerEvents="auto"; ccHead.style.opacity="1"; }
  }
  function updateActionParam(par, val) { val = parseInt(val) || 0; if(val>127) val=127; if (par === 'pc' || par === 'upc') { appData[currentBank][currentPreset].front[par] = val; appData[currentBank][currentPreset].rear[par] = val; } else appData[currentBank][currentPreset][currentTab][par] = val; refreshEditorUI(); markUnsaved(); }
  function updateCCParam(i, par, val) { if(par !== 'use') { val = parseInt(val) || 0; if(val>127) val=127; } appData[currentBank][currentPreset][currentTab].cc[i][par] = val; refreshEditorUI(); markUnsaved(); }
  function updateTitle() { let input = document.getElementById('presetTitle'); if (input.value.length > 11) input.value = input.value.substring(0, 11); appData[currentBank][currentPreset].name = input.value.toUpperCase(); buildUI(); refreshEditorUI(); markUnsaved(); }
  function updateRearTitle() { let input = document.getElementById('rearTitleInput'); if (input.value.length > 11) input.value = input.value.substring(0, 11); appData[currentBank][currentPreset].rearName = input.value.toUpperCase(); markUnsaved(); }
  function toggleRearTitle() { appData[currentBank][currentPreset].useRearName = document.getElementById('useRearTitleToggle').checked; refreshEditorUI(); markUnsaved(); }
  function toggleUseRear() { const p = appData[currentBank][currentPreset], chk = document.getElementById('useRearToggle').checked; if (chk && !p.useRear && confirm("FrontをRearにコピー?")) p.rear = JSON.parse(JSON.stringify(p.front)); p.useRear = chk; refreshEditorUI(); markUnsaved(); }
  function setRearType(t) { appData[currentBank][currentPreset].rearType = t; refreshEditorUI(); markUnsaved(); }
  function switchTab(t) { currentTab = t; document.getElementById('tabFront').className = `tab ${t==='front'?'active':''}`; document.getElementById('tabRear').className = `tab ${t==='rear'?'active':''}`; refreshEditorUI(); }
  function selectPreset(n) { if (currentPreset !== n) { if (isUnsaved() && !confirm("破棄?")) return; currentPreset = n; buildUI(); refreshEditorUI(); if (rxChar) sendBleCommand({ cmd: "change_preset", b: currentBank, p: currentPreset }); } else if (isSmartphone || window.innerWidth <= 768) { document.getElementById('overlay').classList.add('open'); document.getElementById('editor-sheet').classList.add('open'); } }
  async function changeBank(dir) { if (isUnsaved() && !confirm("破棄?")) return; currentBank += dir; if(currentBank>maxBank) currentBank=1; if(currentBank<1) currentBank=maxBank; if (rxChar) { showLoader("LOADING..."); await fetchBankDataBLE(currentBank); sendBleCommand({ cmd: "change_preset", b: currentBank, p: currentPreset }); hideLoader(); } buildUI(); refreshEditorUI(); }
  function toggleAccordion(id) { document.getElementById(id).classList.toggle('open'); }
  function closeSheet() { document.getElementById('overlay').classList.remove('open'); document.getElementById('editor-sheet').classList.remove('open'); }
  function toggleUsbMidi() { isUsbMidiEnabled = document.getElementById('usbMidiToggle').checked; document.getElementById('upcCol').style.display = isUsbMidiEnabled ? 'flex' : 'none'; }
  function markUnsaved() { document.querySelector('.btn-save-main').innerText = "⚠️ SAVE TO DEVICE"; }
  function clearUnsaved() { document.querySelector('.btn-save-main').innerText = "💾 Save to Device"; }
  function isUnsaved() { return document.querySelector('.btn-save-main').innerText.includes("⚠️"); }

  // Utils
  function swapPreset() { openNumpad("Swap Target", {type: 'preset'}, (res) => { let tb=res.b, tp=res.p; if(appData[tb]){ let tmp=JSON.stringify(appData[currentBank][currentPreset]); appData[currentBank][currentPreset]=appData[tb][tp]; appData[tb][tp]=JSON.parse(tmp); buildUI(); refreshEditorUI(); markUnsaved(); } }); }
  function copyPreset() { openNumpad("Copy Target", {type: 'preset'}, (res) => { let tb=res.b, tp=res.p; if(appData[tb]){ appData[tb][tp]=JSON.parse(JSON.stringify(appData[currentBank][currentPreset])); markUnsaved(); } }); }
  function swapBank() { openNumpad("Swap Bank", {max: maxBank}, (tb) => { if(tb>=1 && tb<=maxBank && tb!==currentBank){ let tmp=appData[currentBank]; appData[currentBank]=appData[tb]; appData[tb]=tmp; buildUI(); refreshEditorUI(); markUnsaved(); } }); }
  function copyBank() { openNumpad("Copy Bank", {max: maxBank}, (tb) => { if(tb>=1 && tb<=maxBank && tb!==currentBank){ appData[tb]=JSON.parse(JSON.stringify(appData[currentBank])); markUnsaved(); } }); }
  function clearCurrentPreset() { if(confirm("Clear?")) { appData[currentBank][currentPreset] = { name:`PRESET ${currentBank}-${currentPreset}`, rearName:`REAR ${currentBank}-${currentPreset}`, useRear:false, useRearName:false, rearType:'Tog', front:{pc:0, upc:0, cc:Array.from({length:8},()=>({use:false,num:0,val:0}))}, rear:{pc:0, upc:0, cc:Array.from({length:8},()=>({use:false,num:0,val:0}))} }; buildUI(); refreshEditorUI(); markUnsaved(); } }
  function factoryResetUI() { if(confirm("Reset All Data?")) { initData(); buildUI(); refreshEditorUI(); markUnsaved(); } }
  function saveToPC() { let a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData)); a.download = "midi_backup.json"; a.click(); }
  function loadFromPC(e) { let f = e.target.files[0]; if(!f) return; let r = new FileReader(); r.onload=(ev)=>{ try{ appData=JSON.parse(ev.target.result); buildUI(); refreshEditorUI(); alert("Loaded"); }catch(err){alert("Error");}}; r.readAsText(f); }
  function showLoader(m) { document.getElementById('loader-msg').innerText=m; document.getElementById('loader').style.display='flex'; }
  function hideLoader() { document.getElementById('loader').style.display='none'; }
  function setStatus(s, m) { document.getElementById('status-badge').innerHTML = `<div class="status-dot" style="background:${s==='ok'?'#6c0':'#f44'}"></div> ${m}`; }
  function saveGlobalSettings() { let p = { cmd:"save_global", mC:parseInt(document.getElementById('gs-mc').value), mB:parseInt(document.getElementById('gs-mb').value), uM:document.getElementById('usbMidiToggle').checked?1:0 }; maxBank=p.mB; sendBleCommand(p); }
  async function loadFromDevice() { if(!rxChar)return; if(!confirm("Sync All?"))return; try{ for(let b=1; b<=maxBank; b++){ showLoader(`SYNC BANK ${b}...`); await fetchBankDataBLE(b); await new Promise(r=>setTimeout(r,50)); } buildUI(); refreshEditorUI(); clearUnsaved(); alert("Success"); }catch(e){}finally{hideLoader();} }
  async function sendAllToDevice() { if(!rxChar)return; if(!confirm("Upload All?"))return; try{ for(let b=1; b<=maxBank; b++){ showLoader(`SENDING BANK ${b}...`); for(let p=1; p<=8; p++){ const d=appData[b][p]; const py={cmd:"save", b:b, p:p, q:true, name:d.name, rName:d.useRearName?d.rearName:d.name, uRn:d.useRearName, uR:d.uR, isM:d.rearType==='Mom', f:{pc:d.front.pc, upc:d.front.upc, cU:d.front.cc.map(c=>c.use), cN:d.front.cc.map(c=>c.num), cV:d.front.cc.map(c=>c.val)}, r:{pc:d.front.pc, upc:d.front.upc, cU:d.rear.cc.map(c=>c.use), cN:d.rear.cc.map(c=>c.num), cV:d.rear.cc.map(c=>c.val)}}; await sendBleCommand(py); await new Promise(r=>setTimeout(r,50)); } } await sendBleCommand({cmd:"sync_end"}); clearUnsaved(); alert("Success"); }catch(e){}finally{hideLoader();} }
  async function sendToDevice() { if(!rxChar)return; const btn=document.querySelector('.btn-save-main'); btn.innerText="⏳ Sending..."; const d=appData[currentBank][currentPreset]; const py={cmd:"save", b:currentBank, p:currentPreset, name:d.name, rName:d.useRearName?d.rearName:d.name, uRn:d.useRearName, uR:d.useRear, isM:d.rearType==='Mom', f:{pc:d.front.pc, upc:d.front.upc, cU:d.front.cc.map(c=>c.use), cN:d.front.cc.map(c=>c.num), cV:d.front.cc.map(c => c.val)}, r:{pc:d.front.pc, upc:d.front.upc, cU:d.rear.cc.map(c => c.use), cN:d.rear.cc.map(c => c.num), cV:d.rear.cc.map(c => c.val)}}; try{ await sendBleCommand(py); clearUnsaved(); btn.innerText="✅ Saved"; }catch(e){ btn.innerText="❌ Failed"; } setTimeout(()=>{ btn.innerText="💾 Save to Device"; if(isSmartphone) closeSheet(); },1500); }

  window.onload = () => { initData(); buildUI(); if (!DEBUG_MODE) setUILock(true); };
</script>
</body>
</html>
